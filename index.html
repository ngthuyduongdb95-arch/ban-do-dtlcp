<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Bản đồ DTLCP Điện Biên</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{

height:100%;
margin:0;

}

#map{

width:100%;
height:100%;

}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([21.4,103.0],9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{

maxZoom:19

}).addTo(map);

</script>

</body>
</html>
