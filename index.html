<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>WEBGIS Quản lý thú y tỉnh Điện Biên</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- HEADER -->

<header>

<div class="logo">

🐄 WEBGIS QUẢN LÝ THÚ Y TỈNH ĐIỆN BIÊN

</div>

<div class="toolbar">

<button id="btnHome">

<i class="fa-solid fa-house"></i>

</button>

<button id="btnLocate">

<i class="fa-solid fa-location-crosshairs"></i>

</button>

<button id="btnSatellite">

🛰️

</button>

</div>

</header>

<!-- MAIN -->

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Dashboard</h2>

<div class="card">

<div class="title">

Đang có dịch

</div>

<div id="txtDangCoDich">

0

</div>

</div>

<div class="card">

<div class="title">

Qua 21 ngày

</div>

<div id="txtQua21">

0

</div>

</div>

<div class="card">

<div class="title">

Số ổ dịch

</div>

<div id="txtODich">

0

</div>

</div>

<div class="card">

<div class="title">

Tiêu hủy

</div>

<div id="txtTieuHuy">

0

</div>

</div>

<hr>

<h2>Dữ liệu</h2>

<label>

<input type="checkbox" checked id="chkDTLCP">

DTLCP

</label>

<label>

<input type="checkbox" checked id="chkCGC">

Cúm gia cầm

</label>

<label>

<input type="checkbox" checked id="chkVDNC">

VDNC

</label>

<label>

<input type="checkbox" checked id="chkKSGM">

KSGM

</label>

<label>

<input type="checkbox" checked id="chkCS">

CS thuốc thú y

</label>

<hr>

<h2>Tìm kiếm</h2>

<input

type="text"

id="txtSearch"

placeholder="Nhập tên xã...">

<button id="btnSearch">

Tìm

</button>

</div>

<!-- MAP -->

<div id="map"></div>

</div>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script src="script.js"></script>

</body>

</html>
