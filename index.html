<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Bản đồ DTLCP Điện Biên</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{

height:100%;
margin:0;

}

#map{

width:100%;
height:100%;

}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([21.4,103.0],9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    attribution:'© OpenStreetMap'
}).addTo(map);

Promise.all([

fetch("dienbien_xa.geojson").then(r => r.json()),

fetch("https://script.google.com/macros/s/AKfycbz3zkALIKFWDpCYOs4XoBJMMpZL5dbWy2kubnrQDKyllSk4HyrDVeYDhnMmkr7r5PBy/exec").then(r => r.json())

]).then(function(result){

    const geojson = result[0];
    const dulieu = result[1];

    const bang = {};

    dulieu.forEach(function(x){
        bang[Number(x.ID)] = x;
    });

    var layer = L.geoJSON(geojson,{

        style:function(feature){

            const id = Number(feature.properties.ID);
            const x = bang[id];
            console.log(id, x);

            let mau = "#4CAF50";

            if(x){

                const soCon = Number(x["Số con tiêu hủy"]) || 0;

                if(soCon == 0){
                    mau = "#4CAF50";
                }else if(soCon <= 100){
                    mau = "#FFEB3B";
                }else if(soCon <= 300){
                    mau = "#FF9800";
                }else if(soCon <= 800){
                    mau = "#F44336";
                }else{
                    mau = "#7B1FA2";
                }

            }

            return{
                color:"#333",
                weight:1,
                fillColor:mau,
                fillOpacity:0.7
            };

        },

        onEachFeature:function(feature,layer){

 const id = Number(feature.properties.ID);
const x = bang[id];

            if(x){

                let mucDo="";

                const soCon = Number(x["Số con tiêu hủy"]) || 0;

                if(soCon==0){
                    mucDo="Không có thiệt hại";
                }else if(soCon<=100){
                    mucDo="Thấp";
                }else if(soCon<=300){
                    mucDo="Trung bình";
                }else if(soCon<=800){
                    mucDo="Cao";
                }else{
                    mucDo="Rất cao";
                }

                layer.bindPopup(
                    "<h3>"+x["Tên xã"]+"</h3>"+
                    "<b>Số con tiêu hủy:</b> "+soCon+" con<br>"+
                    "<b>Số ổ dịch:</b> "+x["Số ổ dịch"]+"<br>"+
                    "<b>Mức độ:</b> "+mucDo
                );

            }

        }

    }).addTo(map);

    map.fitBounds(layer.getBounds());

}).catch(function(err){

    console.error(err);

});
</script>

</body>
</html>
